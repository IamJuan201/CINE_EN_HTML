<section class="contact">
        <h1>Contact Us</h1>
        <div>
         <form>
            <label for="names">Names:</label>
            <input type="text" id="names" name="name" placeholder="Names*"><br><br>

            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last_name" placeholder="Last Name*"><br><br>

            <label for="type_of_document" placeholder="type of document*">Type of document:</label>
            <select>
              <option value="CC">Cedula de ciudadania</option>
              <option value="TI">Tarjeta de identidad</option>
              <option value="CE">Cedula de extranjeria</option>
              <option value="PA">Pasaporte</option>
              <option value="NIT">NIT</option>
            </select>
            

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Email*"><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="coment*"></textarea><br><br>

            <input type="submit" value="Submit">
         </form>
        </div>
    
    </section>
